<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Wine</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='10' y1='8' x2='54' y2='58' gradientUnits='userSpaceOnUse'%3E%3Cstop stop-color='%23bc13fe'/%3E%3Cstop offset='.55' stop-color='%23ff0055'/%3E%3Cstop offset='1' stop-color='%2300ff9f'/%3E%3C/linearGradient%3E%3Cfilter id='glow' x='-30%25' y='-30%25' width='160%25' height='160%25'%3E%3CfeGaussianBlur stdDeviation='2.2' result='b'/%3E%3CfeMerge%3E%3CfeMergeNode in='b'/%3E%3CfeMergeNode in='SourceGraphic'/%3E%3C/feMerge%3E%3C/filter%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='%23070216'/%3E%3Cpath d='M18 10h28l5 21c2 14-7 24-19 24S11 45 13 31l5-21Z' fill='%2315162f' stroke='url(%23g)' stroke-width='3' filter='url(%23glow)'/%3E%3Cpath d='M26 24l-7 7 7 7M38 24l7 7-7 7M35 22l-6 20' fill='none' stroke='%2300ff9f' stroke-width='3.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M32 54v6M23 60h18' fill='none' stroke='%23bc13fe' stroke-width='3.4' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #2f315f;
      --bg-deep: #24264b;
      --panel: #353766;
      --panel-soft: #3c3e70;
      --card: #3b3d70;
      --line: rgba(211, 80, 255, .32);
      --line-strong: rgba(211, 80, 255, .72);
      --purple: #bc13fe;
      --green: #00ff9f;
      --blue: #00b8ff;
      --magenta: #ff0055;
      --yellow: #f7ff00;
      --text: #ffffff;
      --muted: #d7d2ea;
      --muted-2: #f1ecff;
      --danger: #ff4d6d;
      --radius: 8px;
      --gap: clamp(10px, 1.1vw, 16px);
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    * {
      min-width: 0;
    }

    html {
      height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100%;
      margin: 0;
      font-family: "Open Sans", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 8%, rgba(188, 19, 254, .22), transparent 28rem),
        radial-gradient(circle at 86% 20%, rgba(0, 184, 255, .16), transparent 30rem),
        radial-gradient(circle at 55% 96%, rgba(0, 255, 159, .08), transparent 24rem),
        linear-gradient(135deg, #2b2d58 0%, var(--bg) 50%, #292956 100%);
      overflow: hidden;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
      max-width: 100%;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
    }

    a {
      color: inherit;
    }

    svg {
      max-width: 100%;
    }

    textarea,
    input {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 7px;
      outline: 0;
      background: rgba(35, 37, 72, .88);
      color: #fff;
    }

    textarea {
      min-height: 140px;
      padding: 12px;
      resize: vertical;
      line-height: 1.62;
    }

    input {
      min-height: 40px;
      padding: 8px 10px;
    }

    input::placeholder,
    textarea::placeholder {
      color: #cfc9e7;
      opacity: 1;
    }

    .app-shell {
      height: 100vh;
      display: grid;
      grid-template-columns: clamp(220px, 18vw, 280px) minmax(0, 1fr) clamp(340px, 27vw, 460px);
      gap: var(--gap);
      padding: var(--gap);
      width: 100%;
    }

    .sidebar,
    .main-panel,
    .notes-panel {
      min-height: 0;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(55, 57, 104, .98), rgba(43, 42, 86, .98));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .055), 0 0 26px rgba(188, 19, 254, .22);
      scrollbar-width: thin;
      scrollbar-color: rgba(188, 19, 254, .7) rgba(255, 255, 255, .06);
    }

    .sidebar {
      padding: clamp(15px, 1.25vw, 22px);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .main-panel {
      padding: clamp(15px, 1.4vw, 24px);
    }

    .notes-panel {
      padding: clamp(14px, 1.2vw, 20px);
    }

    .brand {
      display: grid;
      gap: 10px;
    }

    .brand-mark {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .wine-icon {
      width: 44px;
      height: 54px;
      filter: drop-shadow(0 0 12px rgba(255, 0, 85, .52));
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.1rem, 1.45vw, 1.35rem);
      text-shadow: 0 0 16px rgba(255, 0, 85, .72);
    }

    .brand p,
    .muted {
      color: var(--muted-2);
      line-height: 1.42;
      font-weight: 500;
    }

    .nav-list,
    .clean-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .nav-list {
      display: grid;
      gap: 8px;
    }

    .nav-button {
      width: 100%;
      min-height: 44px;
      display: grid;
      grid-template-columns: 30px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border: 1px solid transparent;
      border-radius: 7px;
      background: transparent;
      color: var(--muted-2);
      text-align: left;
      font-weight: 700;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }

    .nav-button span:nth-child(2) {
      overflow-wrap: anywhere;
    }

    .nav-button:hover,
    .nav-button.active {
      transform: translateX(2px);
      border-color: var(--line-strong);
      background: linear-gradient(90deg, rgba(188, 19, 254, .22), rgba(255, 0, 85, .08));
      color: #fff;
    }

    .nav-icon,
    .status-dot {
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, .14);
      background: rgba(255, 255, 255, .07);
    }

    .nav-icon {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      color: var(--purple);
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 12px;
      border: 1px solid rgba(0, 255, 159, .18);
      border-radius: var(--radius);
      background: rgba(0, 255, 159, .075);
      color: var(--muted-2);
      line-height: 1.42;
    }

    .topbar,
    .page-title,
    .card-head,
    .row,
    .action-row,
    .notes-head,
    .backup-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .topbar {
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .breadcrumb {
      color: var(--muted);
      font-weight: 700;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: min(320px, 42vw);
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 7px;
      background: rgba(255, 255, 255, .07);
      color: var(--muted);
    }

    .search-box input {
      min-height: unset;
      padding: 0;
      border: 0;
      background: transparent;
    }

    .page-title {
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .page-title h2 {
      margin: 0 0 6px;
      font-size: clamp(1.35rem, 2vw, 2.15rem);
    }

    .page-title p {
      display: none;
    }

    .grid {
      display: grid;
      gap: var(--gap);
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: var(--gap);
      align-items: start;
    }

    .span-12 { grid-column: span 12; }
    .span-8 { grid-column: span 8; }
    .span-7 { grid-column: span 7; }
    .span-6 { grid-column: span 6; }
    .span-5 { grid-column: span 5; }
    .span-4 { grid-column: span 4; }
    .span-3 { grid-column: span 3; }

    .card,
    .topic-hero,
    .module-card,
    .track-card,
    .project-card,
    .lesson-card,
    .error-card {
      border: 1px solid rgba(255, 255, 255, .16);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(62, 64, 112, .96), rgba(50, 51, 95, .94));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .065);
    }

    .card-pad,
    .topic-hero,
    .module-card,
    .track-card,
    .project-card,
    .lesson-card,
    .error-card {
      padding: clamp(13px, 1.15vw, 18px);
    }

    .card-title,
    .section-title {
      margin: 0 0 12px;
      font-size: .96rem;
    }

    .metric-value {
      font-size: clamp(1.7rem, 2.6vw, 3rem);
      font-weight: 800;
    }

    .metric-label {
      color: var(--muted-2);
      font-size: .88rem;
      font-weight: 700;
    }

    .progress-ring {
      --value: 0deg;
      width: clamp(112px, 10vw, 148px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: radial-gradient(circle, #272951 0 55%, transparent 56%), conic-gradient(var(--green) var(--value), rgba(255, 255, 255, .18) 0);
      box-shadow: 0 0 22px rgba(0, 255, 159, .2);
    }

    .progress-summary {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 22px;
    }

    .dashboard-summary {
      align-items: center;
      gap: clamp(16px, 1.5vw, 24px);
    }

    .dashboard-copy {
      min-width: 0;
      display: grid;
      align-content: center;
      gap: 14px;
    }

    .dashboard-copy h3 {
      margin: 0;
      font-size: clamp(1.1rem, 1.35vw, 1.45rem);
    }

    .metric-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .metric-chip {
      min-height: 72px;
      display: grid;
      align-content: center;
      gap: 4px;
      padding: 12px;
      border: 1px solid rgba(0, 184, 255, .22);
      border-radius: var(--radius);
      background: rgba(45, 48, 88, .72);
    }

    .metric-chip .metric-value {
      font-size: clamp(1.25rem, 1.6vw, 2rem);
      line-height: 1;
      color: #f1fff9;
    }

    .metric-chip .metric-label {
      font-size: .78rem;
      color: var(--muted);
    }

    .today-card {
      min-height: 100%;
      display: grid;
      align-content: start;
      gap: 14px;
      background:
        linear-gradient(135deg, rgba(188, 19, 254, .18), rgba(0, 184, 255, .07)),
        linear-gradient(180deg, rgba(62, 64, 112, .95), rgba(50, 51, 95, .92));
    }

    .recommendation-card {
      display: grid;
      gap: 14px;
    }

    .recommendation-title {
      margin: 0;
      font-size: clamp(1.2rem, 1.45vw, 1.6rem);
      line-height: 1.2;
    }

    .recommendation-reason {
      margin: 0;
      color: var(--muted-2);
      line-height: 1.48;
      font-weight: 600;
    }

    .dashboard-compact {
      display: grid;
      gap: 10px;
    }

    .metric-list {
      display: grid;
      gap: 10px;
      color: var(--muted-2);
      font-weight: 600;
    }

    .metric-list span {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, .1);
    }

    .metric-list span,
    .track-desc,
    .recommendation-reason,
    .mini-row,
    .practice-box,
    .terminal-box,
    .empty-state {
      overflow-wrap: anywhere;
    }

    .metric-list span:last-child {
      border-bottom: 0;
    }

    .metric-list strong {
      color: #fff;
      font-size: 1.02rem;
    }

    .continue-card {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .focus-box {
      padding: 16px;
      border: 1px solid rgba(255, 0, 85, .42);
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(255, 0, 85, .18), rgba(188, 19, 254, .14));
    }

    .focus-box h3 {
      margin: 0 0 6px;
      font-size: clamp(1rem, 1.2vw, 1.25rem);
    }

    .focus-box p {
      margin: 0 0 8px;
      color: var(--muted-2);
      line-height: 1.42;
      font-weight: 600;
    }

    .today-list,
    .small-stack {
      display: grid;
      gap: 10px;
    }

    .terminal-tip {
      padding: 13px;
      border: 1px solid rgba(0, 255, 159, .18);
      border-radius: var(--radius);
      background: rgba(0, 255, 159, .075);
      color: #d8fff3;
      line-height: 1.48;
      font-weight: 600;
    }

    .week-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: var(--gap);
    }

    .week-title {
      display: grid;
      gap: 4px;
    }

    .week-title h3 {
      margin: 0;
      font-size: clamp(1.1rem, 1.55vw, 1.55rem);
    }

    .week-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      padding-bottom: 4px;
    }

    .day-card {
      min-width: 150px;
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid rgba(188, 19, 254, .22);
      border-radius: var(--radius);
      background: rgba(54, 56, 104, .74);
    }

    .day-card.today {
      border-color: rgba(0, 255, 159, .5);
      box-shadow: 0 0 18px rgba(0, 255, 159, .12);
    }

    .day-card.done {
      border-color: rgba(0, 255, 159, .35);
      background: rgba(0, 255, 159, .06);
    }

    .day-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .day-name {
      margin: 0;
      font-size: .92rem;
    }

    .day-date {
      color: var(--muted);
      font-size: .78rem;
      font-weight: 800;
    }

    .day-card textarea {
      min-height: 58px;
      padding: 9px;
      font-size: .86rem;
      line-height: 1.45;
    }

    .day-card input[type="number"] {
      min-height: 34px;
      padding: 6px 8px;
    }

    .day-check {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted-2);
      font-size: .82rem;
      font-weight: 800;
    }

    .day-check input {
      width: 17px;
      min-height: 17px;
      accent-color: var(--green);
    }

    .week-review-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--gap);
    }

    .progress-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .14);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: var(--fill-color, var(--green));
      box-shadow: 0 0 12px var(--fill-color, var(--green));
      transition: width .22s ease;
    }

    .btn {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 9px 13px;
      border: 1px solid rgba(188, 19, 254, .72);
      border-radius: 6px;
      background: linear-gradient(90deg, rgba(188, 19, 254, .58), rgba(255, 0, 85, .38));
      color: #fff;
      font-size: .79rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
      text-decoration: none;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 18px rgba(188, 19, 254, .24);
    }

    .btn.secondary {
      border-color: rgba(0, 184, 255, .68);
      background: rgba(0, 184, 255, .14);
    }

    .btn.ghost {
      border-color: rgba(255, 255, 255, .16);
      background: rgba(255, 255, 255, .075);
    }

    .btn.danger {
      border-color: rgba(255, 0, 85, .78);
      background: rgba(255, 0, 85, .18);
    }

    .pill,
    .status-badge,
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      padding: 5px 8px;
      border: 1px solid currentColor;
      border-radius: 999px;
      color: var(--status-color, var(--green));
      background: color-mix(in srgb, var(--status-color, var(--green)) 10%, transparent);
      font-size: .76rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .track-grid,
    .topic-grid,
    .project-grid,
    .lesson-grid,
    .mini-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: var(--gap);
    }

    .track-card {
      padding: 14px;
      border-color: rgba(255, 255, 255, .16);
      background: rgba(255, 255, 255, .065);
      transition: transform .18s ease, border-color .18s ease;
    }

    .track-card:hover {
      transform: translateY(-2px);
      border-color: var(--track-color);
    }

    .track-card button {
      width: 100%;
      background: transparent;
      text-align: left;
    }

    .track-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .track-icon {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border: 1px solid var(--track-color);
      border-radius: 8px;
      color: var(--track-color);
      box-shadow: 0 0 14px color-mix(in srgb, var(--track-color) 36%, transparent);
      font-weight: 700;
    }

    .track-percent {
      color: #fff;
      font-weight: 800;
    }

    .track-title {
      margin: 0 0 12px;
      font-size: 1.05rem;
    }

    .track-desc {
      color: var(--muted-2);
      line-height: 1.42;
      font-weight: 600;
    }

    .topic-item {
      width: 100%;
      display: grid;
      grid-template-columns: 32px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 7px;
      background: rgba(255, 255, 255, .06);
      text-align: left;
    }

    .topic-item:hover,
    .topic-item.active {
      border-color: rgba(0, 184, 255, .5);
      background: rgba(0, 184, 255, .07);
    }

    .status-dot {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      color: var(--status-color);
      font-size: .8rem;
      font-weight: 800;
    }

    .module-card {
      margin-bottom: var(--gap);
    }

    .module-card h3 {
      margin-bottom: 4px;
      font-size: 1rem;
    }

    .mini-row {
      display: grid;
      gap: 6px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, .12);
      color: var(--muted-2);
      font-weight: 500;
    }

    .mini-row:last-child {
      border-bottom: 0;
    }

    .mini-row strong {
      color: #fff;
    }

    .mini-row .row {
      justify-content: flex-start;
      flex-wrap: wrap;
    }

    .mini-row .status-badge {
      white-space: normal;
      text-align: center;
    }

    .check-list {
      display: grid;
      gap: 8px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border: 1px solid rgba(255, 255, 255, .13);
      border-radius: 7px;
      background: rgba(255, 255, 255, .06);
      color: var(--muted-2);
      font-weight: 600;
    }

    .check-item input,
    .project-card input {
      width: 18px;
      min-height: 18px;
      accent-color: var(--green);
    }

    .topic-hero {
      display: grid;
      gap: 12px;
      background: linear-gradient(135deg, rgba(188, 19, 254, .13), rgba(0, 184, 255, .05)), rgba(255, 255, 255, .06);
    }

    .topic-title {
      margin: 0 0 6px;
      font-size: clamp(1.35rem, 2vw, 2.05rem);
    }

    .concept-list,
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .practice-box,
    .terminal-box {
      padding: 14px;
      border: 1px solid rgba(0, 255, 159, .22);
      border-radius: var(--radius);
      background: rgba(0, 255, 159, .07);
      color: #e7fff6;
      line-height: 1.48;
    }

    .terminal-box {

    const FIREBASE_SDK_VERSION = "12.15.0";

      async init({ silent = false } = {}) {
        const firebase = getFirebaseSettings();
        if (!firebase.enabled) {
          this.setStatus("Firebase desativado. Salvando apenas neste navegador.");
          return false;
        }
        if (!hasFirebaseConfig(firebase.config)) {
          this.setStatus("Cole o firebaseConfig para ativar a sincronização.");
          return false;
        }
        try {
          const [{ initializeApp, getApps }, firestoreModule] = await Promise.all([
            import(`https://www.gstatic.com/firebasejs/${FIREBASE_SDK_VERSION}/firebase-app.js`),
            import(`https://www.gstatic.com/firebasejs/${FIREBASE_SDK_VERSION}/firebase-firestore.js`)
          ]);
          const { getFirestore, doc, getDoc, setDoc, onSnapshot, serverTimestamp } = firestoreModule;
          this.serverTimestamp = serverTimestamp;

          if (this.unsubscribe) this.unsubscribe();
          this.app = getApps().find(app => app.name === "code-wine") || initializeApp(firebase.config, "code-wine");
          this.db = getFirestore(this.app);
          this.docRef = doc(this.db, firebase.collectionName, firebase.workspaceId);
          const snapshot = await getDoc(this.docRef);
          if (snapshot.exists() && snapshot.data().state) {
            applyingRemoteState = true;
            state = normalizeState(snapshot.data().state);
            localStorage.setItem(dataStore.key, JSON.stringify(state));
            applyingRemoteState = false;
            if (!silent) showToast("Dados carregados do Firebase.");
          } else {
            await this.pushNow();
          }
          this.unsubscribe = onSnapshot(this.docRef, remoteSnapshot => {
            if (!remoteSnapshot.exists() || applyingRemoteState) return;
            const remote = remoteSnapshot.data().state;
            if (!remote) return;
            applyingRemoteState = true;
            state = normalizeState(remote);
            localStorage.setItem(dataStore.key, JSON.stringify(state));
            applyingRemoteState = false;
            render();
          });
          this.ready = true;
          this.setStatus(`Sincronizado com Firestore em ${firebase.collectionName}/${firebase.workspaceId}.`);
          return true;
        } catch (error) {
          this.ready = false;
          this.setStatus(`Erro ao conectar Firebase: ${error.message || error}`);
          return false;

            state: normalizeState(state),

          this.setStatus(`Último envio ao Firebase: ${new Date().toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" })}.`);

          this.setStatus(`Erro ao salvar no Firebase: ${error.message || error}`);

        progress.checklist[8] = true;
        progress.masteryLevel = Math.max(6, getMasteryLevel(topicId, progress.checklist));
        progress.status = "dominado";
        state.reviews[topicId] = { lastReviewedAt: todayISO(), nextReviewAt: progress.nextReviewAt, count: progress.reviewCount };
        this.touch("review");
        this.saveState(state);
      },
      setLastTopic(topicId) {
        state.lastTopicId = topicId;
        this.saveState(state);
      },
      exportData() {
        return JSON.stringify(normalizeState(state), null, 2);
      },
      importData(data) {
        if (!data || typeof data !== "object") throw new Error("Arquivo inválido");
        this.saveState(normalizeState(data));
      },
      clear() {
        this.saveState(structuredClone(defaultState));
      }
    };

    let state = dataStore.getState();
    let appView = "dashboard";
    let selectedTrailId = "html";
    let selectedTopicId = state.lastTopicId || "html-estrutura";
    let activeNoteTab = state.settings.activeNoteTab || "understood";
    let noteTimer;
    let toastTimer;

    const mainPanel = document.getElementById("mainPanel");
    const notesPanel = document.getElementById("notesPanel");
    const navList = document.getElementById("navList");
    const sidebarFooter = document.getElementById("sidebarFooter");
    const toast = document.getElementById("toast");

    const navItems = [
      { id: "dashboard", label: "Dashboard", icon: "⌂", type: "view" },
      ...curriculum.map(trail => ({ id: trail.id, label: trail.title, icon: trail.icon, type: "trail" })),
      { id: "focus", label: "Modo Foco", icon: "◎", type: "view" },
      { id: "revisions", label: "Revisões", icon: "↻", type: "view" },
      { id: "errors", label: "Laboratório", icon: "!", type: "view" },
      { id: "week", label: "Semana", icon: "7", type: "view" },
      { id: "projects", label: "Projetos", icon: "◆", type: "view" },
      { id: "backup", label: "Backup", icon: "⇩", type: "view" }
    ];

    function normalizeState(input) {
      const base = structuredClone(defaultState);
      const merged = { ...base, ...input };
      merged.progress = { ...base.progress, ...(input.progress || {}) };
      merged.notes = { ...base.notes, ...(input.notes || {}) };
      merged.activeRecall = { ...base.activeRecall, ...(input.activeRecall || {}) };
      merged.errors = { ...base.errors, ...(input.errors || {}) };
      merged.reviews = { ...base.reviews, ...(input.reviews || {}) };
      merged.weeklyPlan = { ...base.weeklyPlan, ...(input.weeklyPlan || {}) };
      merged.projectProgress = { ...base.projectProgress, ...(input.projectProgress || {}) };
      merged.studyLog = { ...base.studyLog, ...(input.studyLog || {}) };
      merged.settings = { ...base.settings, ...(input.settings || {}) };
      merged.settings.firebase = { ...base.settings.firebase, ...(input.settings?.firebase || {}) };

      getAllTopics().forEach(({ topic: topicItem }) => {
        const oldProgress = merged.progress[topicItem.id] || {};
        const oldChecklist = oldProgress.checklist || [];
        const checklist = CHECKLIST_ITEMS.map((_, index) => Boolean(oldChecklist[index]));
        const masteryLevel = oldProgress.masteryLevel ?? getMasteryLevel(topicItem.id, checklist);
        merged.progress[topicItem.id] = {
          checklist,
          masteryLevel,
          status: oldProgress.status || getStatusFromLevel(masteryLevel),
          completedAt: oldProgress.completedAt || null,
          firstMasteredAt: oldProgress.firstMasteredAt || null,
          lastReviewedAt: oldProgress.lastReviewedAt || null,
          nextReviewAt: oldProgress.nextReviewAt || null,
          reviewCount: oldProgress.reviewCount || 0,
          updatedAt: oldProgress.updatedAt || null
        };
        merged.notes[topicItem.id] = {
          understood: "",
          memory: merged.activeRecall[topicItem.id]?.answer || "",
          doubts: "",
          practice: "",
          errors: "",
          explanation: "",
          updatedAt: null,
          ...(merged.notes[topicItem.id] || {})
        };
        merged.activeRecall[topicItem.id] = {
          answer: merged.notes[topicItem.id].memory || merged.activeRecall[topicItem.id]?.answer || "",
          updatedAt: merged.activeRecall[topicItem.id]?.updatedAt || merged.notes[topicItem.id].updatedAt || null
        };
        merged.errors[topicItem.id] = {
          tried: "",
          happened: "",
          resolved: "",
          nextTime: "",
          difficulty: merged.notes[topicItem.id].errors || "",
          updatedAt: null,
          ...(merged.errors[topicItem.id] || {})
        };
      });
      return merged;
    }

    function getAllTopics() {
      return curriculum.flatMap(trail => trail.modules.flatMap(module => module.topics.map(topicItem => ({ trail, module, topic: topicItem }))));
    }

    function findTrail(trailId) {
      return curriculum.find(trail => trail.id === trailId) || curriculum[0];
    }

    function findTopic(topicId) {
      return getAllTopics().find(item => item.topic.id === topicId) || getAllTopics()[0];
    }

    function ensureProgress(topicId) {
      if (!state.progress[topicId]) state.progress[topicId] = { checklist: CHECKLIST_ITEMS.map(() => false), masteryLevel: 0, status: "não iniciado" };
      state.progress[topicId].checklist = CHECKLIST_ITEMS.map((_, index) => Boolean(state.progress[topicId].checklist?.[index]));
      return state.progress[topicId];
    }

    function ensureNotes(topicId) {
      if (!state.notes[topicId]) state.notes[topicId] = { understood: "", memory: "", doubts: "", practice: "", errors: "", explanation: "", updatedAt: null };
      return state.notes[topicId];
    }

    function ensureError(topicId) {
      if (!state.errors[topicId]) state.errors[topicId] = { tried: "", happened: "", resolved: "", nextTime: "", difficulty: "", updatedAt: null };
      return state.errors[topicId];
    }

    function getMasteryLevel(topicId, checklist = ensureProgress(topicId).checklist) {
      let level = 0;
      if (checklist[0]) level = Math.max(level, 1);
      if (checklist[1]) level = Math.max(level, 2);
      if (checklist[2]) level = Math.max(level, 3);
      if (checklist[3] || checklist[4] || checklist[5] || checklist[6]) level = Math.max(level, 4);
      if (checklist[7]) level = Math.max(level, 5);
      if (checklist[8]) level = Math.max(level, 6);
      return level;
    }

    function getStatusFromLevel(level) {
      if (level <= 0) return "não iniciado";
      if (level >= 6) return "dominado";
      return "estudando";
    }

    function getLevelMeta(level) {
      const metas = [
        { label: "Nível 0, não iniciado", color: "#8b8ca1", icon: "0" },
        { label: "Nível 1, vi o conteúdo", color: "var(--blue)", icon: "1" },
        { label: "Nível 2, escrevi o que entendi", color: "var(--blue)", icon: "2" },
        { label: "Nível 3, respondi de memória", color: "var(--purple)", icon: "3" },
        { label: "Nível 4, pratiquei no VS Code", color: "var(--purple)", icon: "4" },
        { label: "Nível 5, apliquei em projeto", color: "var(--magenta)", icon: "5" },
        { label: "Nível 6, dominado e revisado", color: "var(--green)", icon: "6" }
      ];
      return metas[level] || metas[0];
    }

    function getTopicStatus(topicId) {
      const progress = ensureProgress(topicId);
      const level = getMasteryLevel(topicId, progress.checklist);
      progress.masteryLevel = level;
      progress.status = getStatusFromLevel(level);
      const meta = getLevelMeta(level);
      return { ...meta, level, status: progress.status };
    }

    function getTrailProgress(trailId) {
      const trail = findTrail(trailId);
      const topics = trail.modules.flatMap(module => module.topics);
      const totalPoints = topics.length * 6;
      const points = topics.reduce((sum, topicItem) => sum + getTopicStatus(topicItem.id).level, 0);
      const dominated = topics.filter(topicItem => getTopicStatus(topicItem.id).level >= 6).length;
      return { total: topics.length, points, dominated, percent: totalPoints ? Math.round((points / totalPoints) * 100) : 0 };
    }

    function getOverallProgress() {
      const topics = getAllTopics();
      const totalPoints = topics.length * 6;
      const points = topics.reduce((sum, item) => sum + getTopicStatus(item.topic.id).level, 0);
      const started = topics.filter(item => getTopicStatus(item.topic.id).level > 0).length;
      const dominated = topics.filter(item => getTopicStatus(item.topic.id).level >= 6).length;
      return { total: topics.length, points, started, dominated, percent: totalPoints ? Math.round((points / totalPoints) * 100) : 0 };
    }

    function getReviewGroups() {
      const today = todayISO();
      const items = getAllTopics().filter(item => {
        const progress = ensureProgress(item.topic.id);
        return progress.masteryLevel >= 3 || progress.nextReviewAt || progress.lastReviewedAt;
      }).map(item => {
        const progress = ensureProgress(item.topic.id);
        const baseDate = progress.firstMasteredAt?.slice(0, 10) || progress.completedAt?.slice(0, 10) || progress.updatedAt?.slice(0, 10) || today;
        const next = progress.nextReviewAt || addDaysISO(1, baseDate);
        return { ...item, nextReviewAt: next, lastReviewedAt: progress.lastReviewedAt };
      });
      return {
        due: items.filter(item => item.nextReviewAt <= today),
        soon: items.filter(item => item.nextReviewAt > today).sort((a, b) => a.nextReviewAt.localeCompare(b.nextReviewAt)).slice(0, 8),
        reviewed: items.filter(item => ensureProgress(item.topic.id).checklist[8] || item.lastReviewedAt).sort((a, b) => (b.lastReviewedAt || "").localeCompare(a.lastReviewedAt || ""))
      };
    }

    function getTodayRecommendation() {
      const reviews = getReviewGroups();
      if (reviews.due.length) {
        const item = reviews.due[0];
        return { type: "review", action: "Revisar agora", item, reason: "Você já estudou este tópico, agora precisa revisar para fixar." };
      }
      const started = getAllTopics().find(item => {
        const level = getTopicStatus(item.topic.id).level;
        return level > 0 && level < 6;
      });
      if (started) {
        const missing = nextAction(started.topic.id);
        return { type: "topic", action: missing, item: started, reason: "Você começou este assunto, mas ainda não completou o ciclo de domínio." };
      }
      const fresh = getAllTopics().find(item => getTopicStatus(item.topic.id).level === 0);
      if (fresh) return { type: "topic", action: "Começar o próximo tópico", item: fresh, reason: "Este é o próximo tópico da sua trilha." };
      const project = practicalProjects.find(item => getProjectPercent(item.id) < 100) || practicalProjects[0];
      return { type: "project", action: "Avançar projeto prático", project, reason: "A próxima evolução vem de aplicar o que você estudou em construção real." };
    }

    function getProjectPercent(projectId) {
      const project = practicalProjects.find(item => item.id === projectId);
      const saved = state.projectProgress[projectId]?.checklist || [];
      const done = project.checklist.filter((_, index) => saved[index]).length;
      return Math.round((done / project.checklist.length) * 100);
    }

    function getMetrics() {
      const overall = getOverallProgress();
      const reviews = getReviewGroups();
      const errors = getErrorEntries();
      const projectsInProgress = practicalProjects.filter(project => {
        const percent = getProjectPercent(project.id);
        return percent > 0 && percent < 100;
      }).length;
      return {
        started: overall.started,
        dominated: overall.dominated,
        reviewsDue: reviews.due.length,
        errors: errors.length,
        projectsInProgress,
        streak: getStudyStreak()
      };
    }

    function getStudyStreak() {
      let streak = 0;
      let day = new Date();
      while (true) {
        const key = day.toISOString().slice(0, 10);
        if (!state.studyLog[key]) break;
        streak += 1;
        day.setDate(day.getDate() - 1);
      }
      return streak;
    }

    function getErrorEntries() {
      return getAllTopics().map(item => {
        const error = ensureError(item.topic.id);
        return { ...item, error };
      }).filter(item => ["tried", "happened", "resolved", "nextTime", "difficulty"].some(field => item.error[field]?.trim()));
    }

    function render() {
      renderNav();
      renderFooter();
      if (appView === "dashboard") renderDashboard();
      if (appView === "trail") renderTrail(selectedTrailId);
      if (appView === "topic") renderTopic(selectedTopicId);
      if (appView === "focus") renderFocusMode(selectedTopicId);
      if (appView === "revisions") renderRevisions();
      if (appView === "errors") renderErrorLab();
      if (appView === "week") renderWeek();
      if (appView === "projects") renderProjects();
      if (appView === "backup") renderBackup();
      renderNotes();
      bindNotesEvents();
      bindGlobalEvents();
    }

    function renderNav() {
      navList.innerHTML = navItems.map(item => {
        const isActive = item.type === "trail" ? appView === "trail" && selectedTrailId === item.id : appView === item.id;
        const progress = item.type === "trail" ? `${getTrailProgress(item.id).percent}%` : "";
        return `<li><button class="nav-button ${isActive ? "active" : ""}" data-nav="${item.id}" data-type="${item.type}">
          <span class="nav-icon">${escapeHTML(item.icon)}</span>
          <span>${escapeHTML(item.label)}</span>
          <span class="metric-label">${progress}</span>
        </button></li>`;
      }).join("");
      navList.querySelectorAll("[data-nav]").forEach(button => {
        button.addEventListener("click", () => {
          if (button.dataset.type === "trail") {
            selectedTrailId = button.dataset.nav;
            appView = "trail";
          } else {
            appView = button.dataset.nav;
          }
          render();
        });
      });
    }

    function renderFooter() {
      const metrics = getMetrics();
      sidebarFooter.innerHTML = `<strong>${metrics.streak} dia${metrics.streak === 1 ? "" : "s"} de sequência</strong><br>
        ${metrics.dominated} tópicos dominados, ${metrics.reviewsDue} revisão${metrics.reviewsDue === 1 ? "" : "ões"} pendente${metrics.reviewsDue === 1 ? "" : "s"}.`;
    }

    function renderTopbar(label) {
      return `<div class="topbar">
        <span class="breadcrumb">${label}</span>
        <label class="search-box" aria-label="Buscar tópico">
          <span>⌕</span>
          <input id="topicSearch" type="search" placeholder="Buscar tópico, trilha ou projeto">
        </label>
      </div>`;
    }

    function renderDashboard() {
      const overall = getOverallProgress();
      const metrics = getMetrics();
      const recommendation = getTodayRecommendation();
      const reviews = getReviewGroups();
      const inProgress = getAllTopics().filter(item => {
        const level = getTopicStatus(item.topic.id).level;
        return level > 0 && level < 6;
      }).slice(0, 4);
      const recentErrors = getErrorEntries().sort((a, b) => (b.error.updatedAt || "").localeCompare(a.error.updatedAt || "")).slice(0, 3);
      const projects = practicalProjects.filter(project => getProjectPercent(project.id) > 0 && getProjectPercent(project.id) < 100).slice(0, 3);
      const last = findTopic(state.lastTopicId || selectedTopicId);
      const todayItem = recommendation.item || findTopic(state.lastTopicId || selectedTopicId);
      mainPanel.innerHTML = `${renderTopbar("Dashboard")}
        <section class="dashboard-grid">
          <article class="card card-pad span-7">
            <h2 class="card-title">Progresso geral por domínio</h2>
            <div class="progress-summary">
              <div class="progress-ring" style="--value:${overall.percent * 3.6}deg"><span class="metric-value">${overall.percent}%</span></div>
              <div class="metric-list">
                <span>Tópicos dominados <strong>${overall.dominated} de ${overall.total}</strong></span>
                <span>Tópicos iniciados <strong>${metrics.started}</strong></span>
                <span>Revisões pendentes <strong>${metrics.reviewsDue}</strong></span>
                <span>Erros registrados <strong>${metrics.errors}</strong></span>
                <span>Sequência de estudo <strong>${metrics.streak} dia${metrics.streak === 1 ? "" : "s"}</strong></span>
              </div>
            </div>
          </article>
          <article class="card card-pad span-5 continue-card">
            <h2 class="card-title">Continuar de onde parou</h2>
            <div class="focus-box">
              <h3>${escapeHTML(last.trail.title)}</h3>
              <p>${escapeHTML(last.topic.title)}</p>
              <p>${escapeHTML(nextAction(last.topic.id))}</p>
            </div>
            <button class="btn" data-open-focus="${last.topic.id}">Abrir Modo Foco</button>
          </article>
          <article class="card card-pad span-7">
            <h2 class="card-title">Progresso por trilha</h2>
            <div class="track-grid" style="margin-top:12px">${curriculum.map(renderTrackCard).join("")}</div>
          </article>
          <article class="card card-pad span-5">
            <h2 class="card-title">Estudo de hoje</h2>
            <div class="today-list">
              <div class="mini-row"><span>Trilha</span><strong>${escapeHTML(recommendation.type === "project" ? "Projetos" : todayItem.trail.title)}</strong></div>
              <div class="mini-row"><span>Tópico</span><strong>${escapeHTML(recommendation.type === "project" ? recommendation.project.title : todayItem.topic.title)}</strong></div>
              <div class="mini-row"><span>Ação</span><small>${escapeHTML(recommendation.action)}</small></div>
              <div class="terminal-tip">${escapeHTML(recommendation.reason)}</div>
            </div>
            <div style="margin-top:14px">
              ${recommendation.type === "project" ? `<button class="btn secondary" data-nav="projects" data-type="view">Começar agora</button>` : `<button class="btn secondary" data-open-focus="${todayItem.topic.id}">Começar agora</button>`}
            </div>
          </article>
          <article class="card card-pad span-4">
            <h2 class="card-title">Revisões pendentes</h2>
            <div class="small-stack" style="margin-top:12px">${reviews.due.length ? reviews.due.slice(0, 3).map(renderMiniTopic).join("") : `<div class="empty-state">Nenhuma revisão pendente agora.</div>`}</div>
          </article>
          <article class="card card-pad span-4">
            <h2 class="card-title">Projetos em andamento</h2>
            <div class="small-stack" style="margin-top:12px">${projects.length ? projects.map(renderMiniProject).join("") : practicalProjects.slice(0, 3).map(renderMiniProject).join("")}</div>
          </article>
          <article class="card card-pad span-4">
            <h2 class="card-title">Ritmo da adega</h2>
            <div class="terminal-tip">Cada tópico só vira domínio quando você lembra, pratica, erra, corrige, explica, aplica e revisa. A aula abre a porta, mas a prática atravessa.</div>
          </article>
          <article class="card card-pad span-12">
            <h2 class="card-title">Tópicos em andamento</h2>
            <div class="topic-grid">${inProgress.length ? inProgress.map(renderMiniTopic).join("") : `<div class="empty-state">Comece um tópico para acompanhar o ciclo de domínio.</div>`}</div>
          </article>
          <article class="card card-pad span-12">
            <h2 class="card-title">Erros recentes</h2>
            <div class="topic-grid">${recentErrors.length ? recentErrors.map(renderMiniError).join("") : `<div class="empty-state">Registre dificuldades para transformar erro em aprendizado.</div>`}</div>
          </article>
        </section>`;
    }

    function metricCard(label, value) {
      return `<div class="metric-chip"><div class="metric-value">${value}</div><div class="metric-label">${label}</div></div>`;
    }

    function renderRecommendation(rec) {
      if (rec.type === "project") {
        return `<div class="recommendation-card">
          <span class="pill" style="--status-color:var(--magenta)">${escapeHTML(rec.action)}</span>
          <h4 class="recommendation-title">${escapeHTML(rec.project.title)}</h4>
          <p class="recommendation-reason">${escapeHTML(rec.reason)}</p>
          <button class="btn" data-nav="projects" data-type="view">Começar agora</button>
        </div>`;
      }
      return `<div class="recommendation-card">
        <span class="pill" style="--status-color:${getTopicStatus(rec.item.topic.id).color}">${escapeHTML(rec.action)}</span>
        <h4 class="recommendation-title">${escapeHTML(rec.item.topic.title)}</h4>
        <p class="muted">${escapeHTML(rec.item.trail.title)}</p>
        <p class="recommendation-reason">${escapeHTML(rec.reason)}</p>
        <button class="btn" data-open-focus="${rec.item.topic.id}">Começar agora</button>
      </div>`;
    }

    function renderTrackCard(trail) {
      const progress = getTrailProgress(trail.id);
      return `<div class="track-card" style="--track-color:${trail.color}">
        <button data-open-trail="${trail.id}">
          <div class="track-head">
            <span class="track-icon">${escapeHTML(trail.icon)}</span>
            <span class="track-percent">${progress.percent}%</span>
          </div>
          <h3 class="track-title">${escapeHTML(trail.title)}</h3>
          <p class="track-desc">${escapeHTML(trail.description)}</p>
          <div class="progress-bar"><div class="progress-fill" style="--fill-color:${trail.color}; width:${progress.percent}%"></div></div>
        </button>
      </div>`;
    }

    function renderTrail(trailId) {
      const trail = findTrail(trailId);
      const progress = getTrailProgress(trail.id);
      mainPanel.innerHTML = `${renderTopbar(`Trilha > ${escapeHTML(trail.title)}`)}
        <section class="page-title">
          <div>
            <h2>${escapeHTML(trail.title)}</h2>
            <p>${escapeHTML(trail.description)}</p>
          </div>
          <span class="pill" style="--status-color:${trail.color}">${progress.dominated} de ${progress.total} dominados</span>
        </section>
        <article class="card card-pad">
          <h3 class="card-title">Domínio da trilha</h3>
          <div class="progress-bar"><div class="progress-fill" style="--fill-color:${trail.color}; width:${progress.percent}%"></div></div>
        </article>
        <section class="grid" style="margin-top:var(--gap)">${trail.modules.map(renderModule).join("")}</section>`;
    }

    function renderModule(module) {
      return `<article class="module-card">
        <h3>${escapeHTML(module.title)}</h3>
        <p class="muted">${escapeHTML(module.description)}</p>
        <div class="grid">${module.topics.map(topicItem => renderTopicButton(topicItem)).join("")}</div>
      </article>`;
    }

    function renderTopicButton(topicItem) {
      const status = getTopicStatus(topicItem.id);
      return `<button class="topic-item ${selectedTopicId === topicItem.id ? "active" : ""}" data-open-topic="${topicItem.id}">
        <span class="status-dot" style="--status-color:${status.color}">${status.icon}</span>
        <span>${escapeHTML(topicItem.title)}</span>
        <span class="status-badge" style="--status-color:${status.color}">${status.label}</span>
      </button>`;
    }

    function renderTopic(topicId) {
      const item = findTopic(topicId);
      const topicItem = item.topic;
      const status = getTopicStatus(topicId);
      const progress = ensureProgress(topicId);
      mainPanel.innerHTML = `${renderTopbar(`${escapeHTML(item.trail.title)} > ${escapeHTML(item.module.title)}`)}
        <section class="grid">
          <article class="topic-hero">
            <div class="card-head">
              <div>
                <h2 class="topic-title">${escapeHTML(topicItem.title)}</h2>
                <p class="muted">${escapeHTML(topicItem.description)}</p>
              </div>
              <span class="status-badge" style="--status-color:${status.color}">${status.label}</span>
            </div>
            <div><strong>Objetivo:</strong> ${escapeHTML(topicItem.objective)}</div>
            <ul class="concept-list">${topicItem.concepts.map(concept => `<li class="tag">${escapeHTML(concept)}</li>`).join("")}</ul>
            <div class="action-row">
              <button class="btn" data-open-focus="${topicId}">Entrar no Modo Foco</button>
              <button class="btn secondary" data-open-trail="${item.trail.id}">Ver trilha</button>
            </div>
          </article>
          <article class="card card-pad">
            <h3 class="section-title">Aulas e materiais</h3>
            <div class="lesson-grid">${topicItem.lessons.map(renderLesson).join("")}</div>
          </article>
          <article class="card card-pad">
            <h3 class="section-title">Checklist de domínio</h3>
            <div class="check-list">${CHECKLIST_ITEMS.map((label, index) => renderCheck(topicId, label, index, progress.checklist[index])).join("")}</div>
          </article>
          <article class="practice-box">

    function getWeeklySummary(weekStart = getSelectedWeekStart()) {
      const days = getCurrentWeekDays(weekStart);
      const weekKey = getWeekKeyFromDate(weekStart);
      const plan = ensureWeekPlan(weekKey);
      const logs = days.map(day => state.studyLog[day]).filter(Boolean);
      const touched = new Set();
      getAllTopics().forEach(item => {
        const progress = ensureProgress(item.topic.id);
        if (progress.updatedAt && days.includes(progress.updatedAt.slice(0, 10))) touched.add(item.topic.id);
      });
      const dominated = getAllTopics().filter(item => {
        const progress = ensureProgress(item.topic.id);
        return progress.masteryLevel >= 6 && progress.updatedAt && days.includes(progress.updatedAt.slice(0, 10));
      }).length;
      const dayEntries = days.map(day => plan.days[day] || {});
      return {
        studied: touched.size,
        dominated,
        reviews: logs.reduce((sum, item) => sum + (item.review || 0), 0),
        errors: logs.reduce((sum, item) => sum + (item.error || 0), 0),
        plannedDays: dayEntries.filter(day => (day.plan || "").trim()).length,
        doneDays: dayEntries.filter(day => day.done).length,
        minutes: dayEntries.reduce((sum, day) => sum + (Number(day.minutes) || 0), 0)
      };
    }

    function bindGlobalEvents() {
      mainPanel.querySelectorAll("[data-open-topic]").forEach(button => button.addEventListener("click", () => openTopic(button.dataset.openTopic)));
      mainPanel.querySelectorAll("[data-open-focus]").forEach(button => button.addEventListener("click", () => openFocus(button.dataset.openFocus)));
      mainPanel.querySelectorAll("[data-open-trail]").forEach(button => button.addEventListener("click", () => {
        selectedTrailId = button.dataset.openTrail;
        appView = "trail";
        render();
      }));
      mainPanel.querySelectorAll("[data-check-topic]").forEach(input => input.addEventListener("change", () => {
        const topicId = input.dataset.checkTopic;
        const checklist = ensureProgress(topicId).checklist.slice();
        checklist[Number(input.dataset.checkIndex)] = input.checked;
        dataStore.updateTopicProgress(topicId, checklist);
        showToast("Progresso salvo.");
        render();
      }));
      mainPanel.querySelectorAll("[data-note-field]").forEach(textarea => bindAutosave(textarea));
      mainPanel.querySelectorAll("[data-error-field]").forEach(textarea => bindErrorAutosave(textarea));
      mainPanel.querySelectorAll("[data-week-field]").forEach(textarea => {
        textarea.addEventListener("input", () => {
          clearTimeout(noteTimer);
          noteTimer = setTimeout(() => {
            dataStore.updateWeekly(textarea.dataset.weekField, textarea.value, textarea.dataset.weekKey);
            showToast("Semana salva.");
          }, 500);
        });
      });
      mainPanel.querySelectorAll("[data-day-field]").forEach(input => {
        const eventName = input.type === "checkbox" ? "change" : "input";
        input.addEventListener(eventName, () => {
          clearTimeout(noteTimer);
          noteTimer = setTimeout(() => {
            const value = input.type === "checkbox" ? input.checked : input.value;
            dataStore.updateWeeklyDay(input.dataset.dayDate, input.dataset.dayField, value);
            showToast("Calendário salvo.");
            if (input.type === "checkbox") render();
          }, input.type === "checkbox" ? 0 : 500);
        });
      });
      mainPanel.querySelectorAll("[data-week-nav]").forEach(button => button.addEventListener("click", () => {
        const next = addDaysISO(Number(button.dataset.weekNav), getSelectedWeekStart());
        dataStore.setSelectedWeek(next);
        render();
      }));
      mainPanel.querySelectorAll("[data-week-today]").forEach(button => button.addEventListener("click", () => {
        dataStore.setSelectedWeek(getWeekStartISO(todayISO()));
        render();
      }));
      mainPanel.querySelectorAll("[data-project-id]").forEach(input => input.addEventListener("change", () => {
        const project = practicalProjects.find(item => item.id === input.dataset.projectId);
        const saved = state.projectProgress[project.id]?.checklist || [];
        const checklist = project.checklist.map((_, index) => Boolean(saved[index]));
        checklist[Number(input.dataset.projectIndex)] = input.checked;
        dataStore.updateProject(project.id, checklist);
        showToast("Projeto atualizado.");
        render();
      }));
      mainPanel.querySelectorAll("[data-open-project-topics]").forEach(button => button.addEventListener("click", () => {
        renderProjectTopics(button.dataset.openProjectTopics);
        bindGlobalEvents();
      }));
      mainPanel.querySelectorAll("[data-nav][data-type]").forEach(button => button.addEventListener("click", () => {
        appView = button.dataset.nav;
        render();
      }));
      mainPanel.querySelectorAll("[data-mark-reviewed]").forEach(button => button.addEventListener("click", () => {
        dataStore.markReviewed(button.dataset.markReviewed);
        showToast("Revisão registrada.");
        render();
      }));
      const exportButton = document.getElementById("exportData");
      if (exportButton) exportButton.addEventListener("click", exportBackup);
      const importInput = document.getElementById("importData");
      if (importInput) importInput.addEventListener("change", importBackup);
      const clearButton = document.getElementById("clearData");
      if (clearButton) clearButton.addEventListener("click", clearBackup);
      const saveFirebaseButton = document.getElementById("saveFirebaseSettings");
      if (saveFirebaseButton) saveFirebaseButton.addEventListener("click", saveFirebaseSettings);
      const connectFirebaseButton = document.getElementById("connectFirebase");
      if (connectFirebaseButton) connectFirebaseButton.addEventListener("click", async () => {
        saveFirebaseSettings({ quiet: true });
        const ok = await cloudStore.init();
        showToast(ok ? "Firebase conectado." : "Confira a configuração do Firebase.");
        render();
      });
      const syncFirebaseButton = document.getElementById("syncFirebaseNow");
      if (syncFirebaseButton) syncFirebaseButton.addEventListener("click", async () => {
        const ok = await cloudStore.pushNow();
        showToast(ok ? "Dados enviados ao Firebase." : "Firebase ainda não está conectado.");
        render();
      });
      const search = document.getElementById("topicSearch");
      if (search) search.addEventListener("input", () => renderSearchResults(search.value));
    }

    function bindNotesEvents() {
      notesPanel.querySelectorAll("[data-note-tab]").forEach(button => button.addEventListener("click", () => {
        activeNoteTab = button.dataset.noteTab;
        state.settings.activeNoteTab = activeNoteTab;
        dataStore.saveState(state);
        renderNotes();
        bindNotesEvents();
      }));
      const noteText = document.getElementById("noteText");
      if (noteText) bindAutosave(noteText);
    }

    function bindAutosave(textarea) {
      textarea.addEventListener("input", () => {
        clearTimeout(noteTimer);
        noteTimer = setTimeout(() => {
          dataStore.updateNote(textarea.dataset.topicId, textarea.dataset.noteField, textarea.value);
          const indicator = document.getElementById("saveIndicator");
          if (indicator) indicator.textContent = `Última atualização: ${formatDate(ensureNotes(textarea.dataset.topicId).updatedAt)}`;
          showToast("Anotação salva automaticamente.");
        }, 500);
      });
    }

    function bindErrorAutosave(textarea) {
      textarea.addEventListener("input", () => {
        clearTimeout(noteTimer);
        noteTimer = setTimeout(() => {
          dataStore.updateError(textarea.dataset.topicId, textarea.dataset.errorField, textarea.value);
          showToast("Erro registrado.");
        }, 500);
      });
    }

    function renderSearchResults(query) {
      const normalized = query.trim().toLowerCase();
      if (!normalized) return;
      const topicResults = getAllTopics().filter(item => `${item.trail.title} ${item.topic.title} ${item.topic.description} ${item.topic.concepts.join(" ")}`.toLowerCase().includes(normalized)).slice(0, 10);
      const projectResults = practicalProjects.filter(project => `${project.title} ${project.description} ${project.subjects.join(" ")}`.toLowerCase().includes(normalized)).slice(0, 6);
      mainPanel.innerHTML = `${renderTopbar("Busca")}
        <section class="page-title">
          <div>
            <h2>Resultados para ${escapeHTML(query)}</h2>
            <p>Abra um tópico ou avance em um projeto relacionado.</p>
          </div>
        </section>
        <section class="grid">
          <article class="card card-pad">
            <h3 class="card-title">Tópicos</h3>
            <div class="grid">${topicResults.length ? topicResults.map(renderMiniTopic).join("") : `<div class="empty-state">Nenhum tópico encontrado.</div>`}</div>
          </article>
          <article class="card card-pad">
            <h3 class="card-title">Projetos</h3>
            <div class="grid">${projectResults.length ? projectResults.map(renderMiniProject).join("") : `<div class="empty-state">Nenhum projeto encontrado.</div>`}</div>
          </article>
        </section>`;
      bindGlobalEvents();
      const input = document.getElementById("topicSearch");
      if (input) {
        input.value = query;
        input.focus();
        input.setSelectionRange(query.length, query.length);
      }
    }

    function openTopic(topicId) {
      selectedTopicId = topicId;
      selectedTrailId = findTopic(topicId).trail.id;
      appView = "topic";
      dataStore.setLastTopic(topicId);
      render();
    }

    function openFocus(topicId) {
      selectedTopicId = topicId;
      selectedTrailId = findTopic(topicId).trail.id;
      appView = "focus";
      dataStore.setLastTopic(topicId);
      render();
    }

    function nextAction(topicId) {
      const checklist = ensureProgress(topicId).checklist;
      const index = checklist.findIndex(item => !item);
      return index >= 0 ? CHECKLIST_ITEMS[index] : "Revisar e aplicar novamente";
    }

    function exportBackup() {
      const blob = new Blob([dataStore.exportData()], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `code-wine-backup-${todayISO()}.json`;
      link.click();
      URL.revokeObjectURL(url);
      showToast("Backup exportado.");
    }

    function importBackup(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (!("progress" in data || "notes" in data || "weeklyPlan" in data)) throw new Error("Formato inválido");
          dataStore.importData(data);
          selectedTopicId = state.lastTopicId || selectedTopicId;
          showToast("Backup importado com sucesso.");
          render();
        } catch {
          showToast("Não foi possível importar esse arquivo.");
        }
      };
      reader.readAsText(file);
      event.target.value = "";
    }

    function clearBackup() {
      const confirmed = confirm("Tem certeza que deseja apagar todos os dados locais do Code Wine? Essa ação limpa progresso, notas, erros, revisões, semana e projetos.");
      if (!confirmed) return;
      dataStore.clear();
      selectedTopicId = state.lastTopicId;
      appView = "dashboard";
      showToast("Dados limpos.");
      render();
    }

    function getFirebaseSettings() {
      const saved = state.settings.firebase || {};
      const parsed = parseFirebaseConfig(saved.configText);
      return {
        enabled: Boolean(saved.enabled),
        configText: saved.configText || "",
        config: { ...FIREBASE_CONFIG, ...parsed },
        workspaceId: sanitizeFirebaseId(saved.workspaceId || "code-wine-main", "code-wine-main"),
        collectionName: sanitizeFirebaseId(saved.collectionName || "codeWineWorkspaces", "codeWineWorkspaces"),
        status: saved.status || "Salvando apenas neste navegador."
      };
    }

    function saveFirebaseSettings(options = {}) {
      const enabled = Boolean(document.getElementById("firebaseEnabled")?.checked);
      const configText = document.getElementById("firebaseConfigText")?.value || "";
      const collectionName = sanitizeFirebaseId(document.getElementById("firebaseCollection")?.value || "codeWineWorkspaces", "codeWineWorkspaces");
      const workspaceId = sanitizeFirebaseId(document.getElementById("firebaseWorkspace")?.value || "code-wine-main", "code-wine-main");
      const previousStatus = state.settings.firebase?.status || "Configuração salva.";
      state.settings.firebase = {
        enabled,
        configText,
        collectionName,
        workspaceId,
        status: enabled ? previousStatus : "Firebase desativado. Salvando apenas neste navegador."
      };
      dataStore.saveState(state);
      if (!options.quiet) {
        showToast("Configuração Firebase salva.");
        render();
      }
    }

    function parseFirebaseConfig(configText) {
      const raw = (configText || "").trim();
      if (!raw) return {};
      try {
        const objectText = raw.includes("{") ? raw.slice(raw.indexOf("{"), raw.lastIndexOf("}") + 1) : raw;
        return Function(`"use strict"; return (${objectText});`)();
      } catch {
        return {};
      }
    }

    function hasFirebaseConfig(config) {
      return Boolean(config?.apiKey && config?.projectId && config?.appId);
    }

    function sanitizeFirebaseId(value, fallback = "code-wine-main") {
      return String(value || "")
        .trim()
        .replace(/[^\w.-]/g, "-")
        .replace(/-+/g, "-")
        .replace(/^-|-$/g, "") || fallback;
    }

    function summarizeError(error) {
      return [error.tried, error.happened, error.resolved, error.nextTime].filter(Boolean).join("\n\n");
    }

    function ensureWeekPlan(weekKey = getSelectedWeekKey()) {
      state.weeklyPlan[weekKey] = state.weeklyPlan[weekKey] || {};
      state.weeklyPlan[weekKey].days = state.weeklyPlan[weekKey].days || {};
      state.weeklyPlan[weekKey].weekKey = weekKey;
      state.weeklyPlan[weekKey].weekStart = state.weeklyPlan[weekKey].weekStart || getSelectedWeekStart();
      return state.weeklyPlan[weekKey];
    }

    function getSelectedWeekStart() {
      const selected = state.settings.selectedWeekStart || getWeekStartISO(todayISO());
      state.settings.selectedWeekStart = selected;
      return selected;
    }

    function getSelectedWeekKey() {
      return getWeekKeyFromDate(getSelectedWeekStart());
    }

    function todayISO() {
      return new Date().toISOString().slice(0, 10);
    }

    function nowISO() {
      return new Date().toISOString();
    }

    function addDaysISO(days, base = todayISO()) {
      const date = new Date(`${base}T12:00:00`);
      date.setDate(date.getDate() + days);
      return date.toISOString().slice(0, 10);
    }

    function formatDate(value) {
      if (!value) return "sem registro";
      const date = new Date(value.length === 10 ? `${value}T12:00:00` : value);
      if (Number.isNaN(date.getTime())) return "sem registro";
      return date.toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit", year: "numeric" });
    }

    function getWeekKey() {
      return getWeekKeyFromDate(todayISO());
    }

    function getWeekKeyFromDate(value) {
      const date = new Date(`${getWeekStartISO(value)}T12:00:00`);
      const first = new Date(date.getFullYear(), 0, 1);
      const days = Math.floor((date - first) / 86400000);
      const week = Math.ceil((days + first.getDay() + 1) / 7);
      return `${date.getFullYear()}-W${String(week).padStart(2, "0")}`;
    }

    function getWeekStartISO(value = todayISO()) {
      const date = new Date(`${value}T12:00:00`);
      const day = date.getDay();
      const monday = new Date(date);
      monday.setDate(date.getDate() - ((day + 6) % 7));
      return monday.toISOString().slice(0, 10);
    }

    function getCurrentWeekDays(weekStart = getWeekStartISO(todayISO())) {
      const monday = new Date(`${weekStart}T12:00:00`);
      return Array.from({ length: 7 }, (_, index) => {
        const item = new Date(monday);
        item.setDate(monday.getDate() + index);
        return item.toISOString().slice(0, 10);
      });
    }

    function getWeekRangeLabel(weekStart) {
      const days = getCurrentWeekDays(weekStart);
      return `${formatDate(days[0])} a ${formatDate(days[6])}`;
    }

    function escapeHTML(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[char]);
    }

    function showToast(message) {
      clearTimeout(toastTimer);
      toast.textContent = message;
      toast.classList.add("show");
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    render();
    if (getFirebaseSettings().enabled) {
      cloudStore.init({ silent: true });
    }
  </script>
</body>
</html>
